# defaults.conf - baked hardened defaults for awg2
# ---------------------------------------------------------------------------
# Edit this once, then `sudo ./awg2` needs NO flags. Every value here can also
# be overridden by an environment variable of the same name at runtime.
# This file is sourced by bash: use KEY="value" (no spaces around =).
# ---------------------------------------------------------------------------

# === THE ONE KNOB YOU MUST SET ============================================
# SNI embedded in the fake QUIC ClientHello (I1 mimicry). Pick a LOW-PROFILE
# domain that your censor is unlikely to block and that is plausible for your
# exit's region. Each deploy should use a DIFFERENT one (per-deploy uniqueness).
#
#   DO use : a quiet CDN/financial/gov/enterprise host
#            (e.g. www.gov.uk, static.licdn.com, a small SaaS domain)
#   DON'T  : youtube.com, *.cloudflare.com, discord, telegram CDNs,
#            *.googlevideo.com, STUN hosts  (blocked or infra-overlap)
#
# This is a MOVING TARGET. If it stops working, rotate: `awg2 rotate-sni <new>`.
# Leave empty to fall back to shape-only QUIC (still looks like QUIC, no SNI).
AWG_SNI=""

# === transport ============================================================
AWG_PORT="443"          # UDP/443 blends with QUIC/HTTP-3. Use a low port (e.g. 1234) only if the ISP blocks high UDP but not 443.
AWG_TUNNEL="full"       # full = route everything (recommended, no leaks) | amnezia = split-tunnel (Amnezia block-list only)
AWG_MIMICRY="quic"      # quic = real QUIC Initial + SNI (best vs serious DPI) | shape = QUIC-looking only | off = keep upstream I1
AWG_PRESET=""           # "" = default profile | "mobile" = for RU/Iran cellular DPI (fixes Jc=3, narrows Jmax)
AWG_SUBNET=""           # "" = upstream default (10.9.9.0/24); override like "10.20.30.0/24"

# === first client =========================================================
AWG_FIRST_CLIENT="phone"   # auto-created on install, QR printed; set "" to skip

# === TCP/443 leg — Xray VLESS+REALITY (co-located with AWG/UDP) ============
# AmneziaWG is UDP-only; this adds a SEPARATE TCP/443 path for UDP-blocked
# networks. Each client then gets TWO QRs (AWG + vless://reality).
TCP_ENABLED="1"            # 1 = also stand up the TCP/443 VLESS+REALITY leg (default; set 0 for AWG-only)
TCP_PORT="443"            # TCP; AWG keeps UDP/443 (no L4 conflict)
TCP_TRANSPORT="vision"    # vision = China-leaning, Amnezia-app-friendly | xhttp = RU-hardened (survives Nov-2025 TSPU), Xray clients only
REALITY_DEST=""          # decoy site to "borrow", host[:443]. Must be REALITY-FRIENDLY:
                          #   TLS1.3 + HTTP/2 + a SMALL clean cert chain, foreign, non-redirecting.
                          #   Good (verified): dl.google.com, www.lovelive-anime.jp, cdn.jsdelivr.net
                          #   BAD: www.microsoft.com / www.amazon.com (huge RSA+OCSP chain breaks the
                          #        REALITY handshake), Apple/overused hosts, anything on your own ASN.
                          #   Empty -> randomized pick from the curated default list.
REALITY_SERVERNAME=""    # SNI; defaults to the host part of REALITY_DEST
XRAY_VERSION="v26.3.27"  # pinned; MUST be >= v25.6.8 (REALITY NewSessionTicket/Aparecium fix)
XRAY_FP="chrome"         # client uTLS fingerprint (chrome|firefox|safari|random)

# --- MAX extras (optional) ---
# CDN-fronted XHTTP+TLS inbound (beats AS/IP-reputation cuts; needs YOUR domain on Cloudflare,
# a real ACME cert, and Cloudflare Full-strict). REALITY can NOT sit behind a CDN, so this is
# a separate TLS inbound. Leave CDN_DOMAIN empty to disable.
CDN_DOMAIN=""            # e.g. cdn.example.com (Cloudflare orange-cloud, SSL=Full(strict), WebSockets on)
CDN_CERT=""              # /path/fullchain.pem
CDN_KEY=""               # /path/privkey.pem
CDN_PATH="/"
CDN_PORT="8443"          # origin port behind the CDN (CF-supported: 443/2053/2083/2087/2096/8443)
CDN_PUBLIC_PORT="443"    # the Cloudflare-facing port clients connect to
# Post-quantum VLESS-Encryption (ML-KEM-768, Xray PR #5067, GA in v26.x). ADVANCED: both ends
# must run Xray >= v26.1.31; leave as "none" unless you control all clients. Generate the pair
# with `xray x25519` + `xray mlkem768` and paste the full strings here.
VLESS_DECRYPTION="none"
VLESS_ENCRYPTION_CLIENT="none"
# NOTE: DAITA / Maybenot flow-shaping is Mullvad-relay-only and is NOT available for
# self-hosted AmneziaWG in 2026 — root.vpn does not (cannot) offer it. AWG gives DPI-evasion
# (junk/padding/ranged headers), not statistical traffic-analysis defense.

# === upstream pin =========================================================
# Bump UPSTREAM_VERSION to update the underlying installer. Optionally pin a
# sha256 (UPSTREAM_SHA256) for supply-chain integrity beyond the git tag.
UPSTREAM_REPO="bivlked/amneziawg-installer"
UPSTREAM_VERSION="v5.18.1"
UPSTREAM_SCRIPT="install_amneziawg_en.sh"
UPSTREAM_SHA256="474534b5c278c2d383039d717217e89526c3d93a8d71f729b301e57c77f1f87e"  # sha256 of install_amneziawg_en.sh @ UPSTREAM_VERSION above; UPDATE THIS if you bump the version (install refuses to run on mismatch)

# If you run `curl .../awg2 | sudo bash` (no local checkout), set this to your
# fork's raw base so awg2 can fetch lib/quic_i1.py:
# SELF_RAW_BASE="https://raw.githubusercontent.com/antidetect/root.vpn/main"
SELF_RAW_BASE=""
